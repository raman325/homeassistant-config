id: routine_morning
alias: 'Routine: Morning'
trigger:
  platform: state
  entity_id:
  - binary_sensor.living_room_occupancy_occupancy
  - light.living_room
  - light.1st_floor_hallway
  - light.kitchen
  to: 'on'
condition:
  alias: Check that the home mode is currently night and its after 6 AM
  and:
  - condition: time
    after: 06:00:01
    before: '23:59:59'
  - condition: state
    entity_id: input_select.home_mode
    state: Night
action:
  alias: Set Home Mode to Home
  service: input_select.select_option
  data:
    entity_id: input_select.home_mode
    option: Home
